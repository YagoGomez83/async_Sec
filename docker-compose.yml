version: "3.8"

services:
  api_gateway:
    build: .
    container_name: sec_api_gateway
    command: bash -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Sobrescribimos hostnames locales por los del DNS de Docker
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - async_sec_net
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: sec_db_postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sec_db_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-SuperSecureDBPassword123!}
      - POSTGRES_DB=${POSTGRES_DB:-security_scans_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - async_sec_net
    restart: unless-stopped

  celery_worker:
    build: .
    container_name: sec_celery_worker
    # En Linux ya no necesitamos el --pool=solo. Usaremos el de alto rendimiento.
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - async_sec_net
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sec_broker_rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-sec_admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-StrongPassw0rd!}
    ports:
      - "5672:5672" # Puerto principal AMQP
      - "15672:15672" # Interfaz de Management
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - async_sec_net
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: sec_state_redis
    command: redis-server --requirepass ${REDIS_PASS:-AnotherStrongPassw0rd!}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - async_sec_net
    restart: unless-stopped

volumes:
  rabbitmq_data:
  redis_data:
  postgres_data:

networks:
  async_sec_net:
    driver: bridge
